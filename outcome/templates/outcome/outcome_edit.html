{% extends 'base.html' %}
{% block content %}

<h2>Edit Expense</h2>
<form method="POST">
    {% csrf_token %}
    <label>Amount</label>
    <input type="number" name="amount" step="0.01" value="{{ outcome.amount }}" required>
    <label>Date</label>
    <input type="date" name="date" value="{{ outcome.date }}" required>
    <label>Category</label>
    <select name="category">
        {% for category in categories %}
            <option value="{{ category.id }}" {% if category == outcome.category %}selected{% endif %}>
                {{ category.icon }} {{ category.name }}
            </option>
        {% endfor %}
    </select>
    <button class="btn btn-primary" type="submit">Save</button>
</form>
<br>
<a href="{% url 'outcome_list' %}">Back</a>

{% endblock %}
